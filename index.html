<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ZeroCog</title>
  <meta name="description" content="ZeroCog — infraestructura cognitiva y soberanía de datos." />
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,sans-serif;margin:0;display:grid;place-items:center;min-height:100vh;background:#0b0f14;color:#e6edf3}
    .card{max-width:760px;padding:48px 32px;border:1px solid #223046;border-radius:18px;background:rgba(255,255,255,0.03)}
    h1{margin:0 0 12px;font-size:42px;letter-spacing:-0.02em}
    p{margin:0 0 18px;line-height:1.55;color:#b7c4d3}
    .tag{display:inline-block;padding:6px 10px;border-radius:999px;border:1px solid #2b3b55;color:#b7c4d3;font-size:13px;margin-bottom:18px}
    a{color:#7dd3fc;text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <main class="card">
    <div class="tag">ZeroCog (antes Symbyotic)</div>
    <h1>Infraestructura cognitiva soberana</h1>
    <p>Contexto real, continuo y controlado — sin convertir datos personales u organizativos en materia prima.</p>
    <p><a href="https://github.com/GoldorTeps/zerocog-web">Repositorio</a></p>
  </main>
</body>
</html>
